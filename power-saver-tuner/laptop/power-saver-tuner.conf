# Configuration for power-saver-tuner on Framework 13 AMD

# ==================== CPU Settings ====================
# Max frequency limits in kHz for each profile:
# - Set to 'auto' to use the lowest non-linear frequency (typically 1.1 GHz on Ryzen 7840U).
# - Set to 'min' to lock at minimum (419 MHz).
# - Set to 'none' to keep unrestricted (default hardware boost).
# - Or set a specific frequency in kHz (e.g. 2000000 for 2.0 GHz, 2200000 for 2.2 GHz).
LIMIT_FREQ_POWER_SAVER=auto
LIMIT_FREQ_BALANCED=2500000
LIMIT_FREQ_PERFORMANCE=none

# Whether to disable CPU boost (Turbo Boost / Turbo Core) for each profile (yes/no).
# Disabling boost in Balanced and Power Saver keeps CPU temperatures and power consumption low.
DISABLE_BOOST_POWER_SAVER=yes
DISABLE_BOOST_BALANCED=yes
DISABLE_BOOST_PERFORMANCE=no


# ==================== GPU Settings ====================
# AMDGPU general performance level (power_dpm_force_performance_level) for each profile.
# - 'low'  - Force GPU to minimum clocks (800 MHz core, 1000 MHz memory) for maximum battery savings.
# - 'auto' - Standard dynamic scaling (driver default).
# - 'none' - Do not modify GPU performance level.
GPU_PERF_LEVEL_POWER_SAVER=low
GPU_PERF_LEVEL_BALANCED=auto
GPU_PERF_LEVEL_PERFORMANCE=auto

# AMDGPU core frequency states limit (sclk) for each profile (requires amdgpu.ppfeaturemask enabled).
# Phoenix APU (Radeon 780M) has core states: 0 (800MHz), 1 (1100MHz), 2 (2700MHz).
# - 'none' keeps the core clock unrestricted.
GPU_SCLK_LIMIT_POWER_SAVER=none
GPU_SCLK_LIMIT_BALANCED=none
GPU_SCLK_LIMIT_PERFORMANCE=none

# AMDGPU memory frequency states limit (mclk) for each profile (requires amdgpu.ppfeaturemask enabled).
GPU_MCLK_LIMIT_POWER_SAVER=none
GPU_MCLK_LIMIT_BALANCED=none
GPU_MCLK_LIMIT_PERFORMANCE=none

# ==================== GPU Filter ====================
# Filter GPU device to apply settings to (e.g. 'all', 'card0', 'card1', etc.)
# Useful on hybrid/dual GPU systems to prevent restricting the discrete card.
GPU_DEVICE_FILTER=all

